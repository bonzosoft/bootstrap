services:
  pwsh:
    image: ghcr.io/bonzosoft/pwsh:7.6.0
    working_dir: ${PWD}
    #entrypoint: ["pwsh"]
    cmd: [CMD-SHELL, pwsh -File ./bootstrap -Action menu]
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /mnt:/mnt:rw
      - ${PWD}/.config/gh:/root/.config/gh